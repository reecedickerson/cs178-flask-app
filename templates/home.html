<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        h1 {text-align: center;}
        div {text-align: center;}
    </style>
    <title>Home Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- display a flash message here, if necessary -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <img src="{{ url_for('static', filename='camera.png') }}" alt="Camera Icon" class="img-fluid" style="max-width: 150px; margin-top: 20px;">
        <h1 class="mt-5">Movies Database</h1>
        <div class="mt-3">
            <!-- Add Movie Button -->
            <a href="/add-movie" class="btn btn-primary">Add Movie</a>
            <!-- Delete Movie Button -->
            <a href="/delete-movie" class="btn btn-danger">Delete Movie</a>
            <!-- Update Movie Button -->
            <a href="/update-movie" class="btn btn-secondary">Update Movie</a>
            <!-- Display All Movies Button -->
            <a href="/display-movies" class="btn btn-info">Search For Movies!</a>
        </div>
    </div>
</body>
</html>
