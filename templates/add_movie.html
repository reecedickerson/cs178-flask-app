<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add New Movie</title>
    <!-- Bootstrap CSS for styling -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body style="background-color:rgb(55, 141, 218)">
    <div class="container">
        <h2 class="mt-5">Add New Movie</h2>

        <!-- Add Movie Form -->
        <form action="{{ url_for('add_movie') }}" method="post" class="mb-4">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="title">Movie Title:</label>
                        <input type="text" class="form-control" id="title" name="title"
                               placeholder="Enter movie title..." required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="overview">Movie Overview:</label>
                        <textarea class="form-control" id="overview" name="overview"
                                  rows="3" placeholder="Enter movie overview..." required></textarea>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-success">Add Movie</button>
                <a href="/" class="btn btn-secondary ml-2">Back to Home</a>
            </div>
        </form>
    </div>
</body>
</html>
